  # - "No remote option"
  # - "Micromanagement"
  # - "No learning budget"

# Strengths you recognize in yourself
self_identified_strengths: []
  # - "Fast learner"
  # - "Systems thinking"
  # - "Clear communication"

# ─── Life Context ────────────────────────────────────────────────────────
# Maps to: PramedhaProfile.personal.life_context
# These shape how AI calibrates advice. DEEPLY private.

# Where are you in your career journey?
career_stage: ""                  # early_career | mid_career | senior | career_change | re_entry | sabbatical

# How much risk can you take right now?
risk_tolerance: ""                # conservative | moderate | aggressive

# How much time can you dedicate to the career transition?
time_availability: ""             # full_time_search | evenings_weekends | limited | unemployed

# How long can you search without income? ⚠️ NEVER SHARE
