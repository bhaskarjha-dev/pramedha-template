# Location constraints that shape job search
location_constraints: []
  # - "Must stay in [city] for family reasons"
  # - "Open to relocation within [country]"
  # - "Cannot relocate before [date]"

# Notice period at current employer
notice_period_days: 0             # 0 = immediate, 30, 60, 90
