# What you value in work (list your top 5)
work_values: []
  # - "Learning & growth"
  # - "Autonomy"
  # - "Impact"
  # - "Work-life balance"
  # - "Compensation"

# Remote preference: onsite | remote | hybrid
remote_preference: ""

# Team preferences
team_size_preference: ""          # small (2-5) | medium (5-15) | large (15+)
structure_preference: ""          # startup | corporate | hybrid
pace_preference: ""               # fast | steady | flexible
growth_orientation: ""            # technical | management | hybrid

# Absolute deal-breakers (things that would make you leave/decline)
