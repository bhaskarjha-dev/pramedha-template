    institution: ""
    university: ""            # If different from institution
    year: 0                   # Graduation year
    score: ""                 # GPA, CGPA, percentage, etc.
    honors: []                # e.g., ["Cum Laude", "Dean's List"]
    courses: []               # Relevant coursework
    verification: ""

