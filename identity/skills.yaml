#     years: 3
#     evidence: "Used in all AI projects, 5 production deployments"
#     verification: "✅ VERIFIED"
#
#   - name: "JavaScript"
#     level: "intermediate"
#     years: 2
#     evidence: "Built 3 web apps"
#     verification: "✅ VERIFIED"

