# ============================================================================
# SKILLS — Categorized Skill Matrix
# ============================================================================
# Maps to: PramedhaProfile.professional.skills[]
#
# Group skills by category. Each skill has:
#   name       — Canonical name (e.g., "Python", not "python" or "Python 3.x")
#   level      — beginner | intermediate | advanced | expert
#   years      — Years of experience (approximate)
#   evidence   — What proves this skill (project name, cert, etc.)
#   verification — ✅ VERIFIED | ⚠️ ESTIMATED | ❌ UNVERIFIED
#
# Categories are flexible. Common ones:
#   Programming, Frameworks, AI/ML, Cloud, Databases, DevOps, Tools,
#   Design, Communication, Leadership, Domain Knowledge
#
# For Pramedha import, skills are normalized to canonical IDs:
#   canonical_id: "pramedha:python"  (auto-generated on import)
# ============================================================================

# ─── Example Category (delete and replace with your own) ─────────────────

